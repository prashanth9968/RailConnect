spring:
  application:
    name: tracking-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:railconnect}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 2000ms
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

server:
  port: ${PORT:8085}
  compression:
    enabled: true

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:your_maps_api_key}

logging:
  level:
    com.railconnect: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

tracking:
  provider: ${TRACKING_PROVIDER:simulated}
