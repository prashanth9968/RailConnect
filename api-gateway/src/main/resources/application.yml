server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: booking-service
          uri: ${BOOKING_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/bookings/**

        - id: tracking-service-live
          uri: ${TRACKING_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/trains/*/live-status, /api/v1/trains/*/maps-config

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/trains/**, /api/v1/stations/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/payments/**

        - id: tracking-service
          uri: ${TRACKING_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/tracking/**

        - id: tracking-websocket
          uri: ${TRACKING_WEBSOCKET_URI:ws://localhost:8085}
          predicates:
            - Path=/ws/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/notifications/**
